# Nombre del microservicio
spring.application.name=servicio-menu

# Puerto único para el Menú (Evita el choque con el 8080 de Mesas)
server.port=8081

# Configuración de Base de Datos en memoria (H2) para pruebas rápidas
spring.datasource.url=jdbc:h2:mem:menudb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true

# Registro automático en tu Servidor Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true
