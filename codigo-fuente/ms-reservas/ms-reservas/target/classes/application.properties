spring.application.name=ms-reservas
# Puerto interno (dentro del contenedor es 8080, Docker lo saca por el 8081)
server.port=8084

# Conexión a MySQL (usamos el nombre del servicio del docker-compose)
spring.datasource.url=jdbc:mysql://mysql_servidor:3306/restaurante_db?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=clave_maestra_root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate: crea las tablas automáticamente
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
